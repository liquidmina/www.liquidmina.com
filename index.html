<!-- ═══════════════════════════════════════════════════

<script>
// ══════════════════════════════ BACKGROUND CANVAS ══════════════════════════════
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, frame = 0;
let glowX, glowY, targetGlowX, targetGlowY;
let particles = [], dataLines = [];

const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (glowX === undefined) { glowX = W*.5; glowY = H*.45; targetGlowX = glowX; targetGlowY = glowY; }
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => { targetGlowX = e.clientX; targetGlowY = e.clientY; });

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random()*W; this.y = Math.random()*H;
    this.size = Math.random()*1.4+.3;
    this.speedX = (Math.random()-.5)*.22; this.speedY = (Math.random()-.5)*.22;
    this.opacity = Math.random()*.35+.05;
    this.life = 0; this.maxLife = Math.random()*300+200;
    this.col = Math.random()<.5 ? '#6ab4ff' : '#00d4aa';
  }
  update() { this.x+=this.speedX; this.y+=this.speedY; this.life++; if(this.x<0||this.x>W||this.y<0||this.y>H||this.life>this.maxLife) this.reset(); }
  draw() {
    const f = this.life<30?this.life/30:this.life>this.maxLife-30?(this.maxLife-this.life)/30:1;
    ctx.globalAlpha = this.opacity*f;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fillStyle=this.col; ctx.fill();
  }
}
class DataLine {
  constructor() { this.reset(); }
  reset() { this.x=Math.random()*W; this.y=-20; this.speed=Math.random()*.7+.25; this.opacity=Math.random()*.07+.02; this.length=Math.random()*70+20; }
  update() { this.y+=this.speed; if(this.y>H+100) this.reset(); }
  draw() { ctx.globalAlpha=this.opacity; ctx.strokeStyle='#2979ff'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(this.x,this.y); ctx.lineTo(this.x,this.y+this.length); ctx.stroke(); }
}
for(let i=0;i<130;i++) particles.push(new Particle());
for(let i=0;i<20;i++) { const dl=new DataLine(); dl.y=Math.random()*H; dataLines.push(dl); }

async function drawBg() {
  frame++;
  ctx.clearRect(0,0,W,H);
  const bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#080e1a'); bg.addColorStop(.5,'#0c1830'); bg.addColorStop(1,'#050a12');
  ctx.globalAlpha=1; ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  glowX += (targetGlowX-glowX)*.038; glowY += (targetGlowY-glowY)*.038;
  const r1=Math.min(W,H)*.52;
  const g1=ctx.createRadialGradient(glowX,glowY,0,glowX,glowY,r1);
  g1.addColorStop(0,'rgba(25,100,255,.16)'); g1.addColorStop(.4,'rgba(12,60,180,.08)'); g1.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g1; ctx.fillRect(0,0,W,H);
  const pulse=.11+Math.sin(frame*.011)*.04;
  const g2=ctx.createRadialGradient(W*.5,H*.28,0,W*.5,H*.28,W*.38);
  g2.addColorStop(0,`rgba(18,95,245,${pulse})`); g2.addColorStop(.5,`rgba(0,180,140,${pulse*.3})`); g2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g2; ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=1; dataLines.forEach(d=>{d.update();d.draw()}); particles.forEach(p=>{p.update();p.draw()});
  const hy=H*.6, hg=ctx.createLinearGradient(W*.15,hy,W*.85,hy);
  hg.addColorStop(0,'rgba(0,0,0,0)'); hg.addColorStop(.5,`rgba(41,121,255,${.12+Math.sin(frame*.007)*.04})`); hg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.globalAlpha=1; ctx.fillStyle=hg; ctx.fillRect(W*.15,hy-1,W*.7,2);
  ctx.globalAlpha=1; requestAnimationFrame(drawBg);
  await sleep(10);
}
drawBg();

// ══════════════════════════════ SCROLL ANIMATIONS ══════════════════════════════
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: .15 });
document.querySelectorAll('.feat-card,.moat-card').forEach(el => observer.observe(el));
</script>
